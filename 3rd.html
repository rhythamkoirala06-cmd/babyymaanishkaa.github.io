  <script>
    const moveRandom = document.querySelector("#move-random");

    function moveRandomEl(elm) {
      elm.style.position = "fixed"; // stays on screen
      elm.style.top = Math.floor(Math.random() * 70 + 15) + "vh";
      elm.style.left = Math.floor(Math.random() * 70 + 15) + "vw";
      elm.style.zIndex = 1000; // ensure it's on top
    }

    if (moveRandom) {
      // Move button when mouse tries to enter
      moveRandom.addEventListener("mouseenter", function (e) {
        moveRandomEl(e.target);
      });

      // Also move on click attempt (optional)
      moveRandom.addEventListener("mousedown", function (e) {
        moveRandomEl(e.target);
        e.preventDefault(); // prevent accidental click
      });
